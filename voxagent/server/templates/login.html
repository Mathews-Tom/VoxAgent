<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Login — VoxAgent</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-50 min-h-screen flex items-center justify-center">

  <div class="w-full max-w-md">
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 px-8 py-10">
      <div class="mb-8 text-center">
        <h1 class="text-2xl font-bold text-gray-900">VoxAgent</h1>
        <p class="text-sm text-gray-500 mt-1">Sign in to your dashboard</p>
      </div>

      {% if error %}
      <div class="mb-5 px-4 py-3 rounded-md bg-red-50 border border-red-200 text-sm text-red-700">
        {{ error }}
      </div>
      {% endif %}

      <form method="POST" action="/dashboard/login" class="space-y-5">
        <div>
          <label for="tenant_id" class="block text-sm font-medium text-gray-700 mb-1">
            Tenant ID
          </label>
          <input
            type="text"
            id="tenant_id"
            name="tenant_id"
            required
            placeholder="xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx"
            class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm text-gray-900 placeholder-gray-400 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>

        <div>
          <label for="password" class="block text-sm font-medium text-gray-700 mb-1">
            Password
          </label>
          <input
            type="password"
            id="password"
            name="password"
            required
            class="w-full px-3 py-2 border border-gray-300 rounded-md text-sm text-gray-900 focus:outline-none focus:ring-2 focus:ring-indigo-500 focus:border-indigo-500"
          />
        </div>

        <button
          type="submit"
          class="w-full px-4 py-2 bg-indigo-600 text-white text-sm font-semibold rounded-md hover:bg-indigo-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-indigo-500 transition-colors"
        >
          Sign in
        </button>
      </form>
    </div>
  </div>

</body>
</html>
